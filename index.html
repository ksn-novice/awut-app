<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ฐานข้อมูลสามเณร</title>
    <link rel="apple-touch-icon" href="https://i.ibb.co/Zpy6YqJq/image.png">
    <link rel="icon" type="image/png" href="https://i.ibb.co/Zpy6YqJq/image.png">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* (ใส่ CSS เดิมของคุณทั้งหมดจากไฟล์ก่อนหน้าได้เลยครับ ผมละไว้เพื่อความกระชับ) */
        body { font-family: 'Sarabun', sans-serif; background-color: #fcf6ec; margin: 0; padding: 15px; }
        .form-card { background-color: #ffffff; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin: auto; }
        .page-section { display: none; }
        .page-section.active { display: block; }
        .btn-main { width: 100%; padding: 14px; background-color: #d35400; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-top: 5px; }
        /* ... CSS ส่วนอื่นๆ ... */
    </style>
</head>
<body>
    <div class="form-card">
        <div id="page-login" class="page-section active">
            <div style="text-align:center;"><img src="https://i.ibb.co/Zpy6YqJq/image.png" width="90"><h2>ระบบฐานข้อมูลส่วนตัว</h2></div>
            <input type="text" id="loginUser" placeholder="ชื่อ-นามสกุล">
            <input type="password" id="loginPassword" placeholder="รหัสผ่าน">
            <button class="btn-main" onclick="apiCall('login')">เข้าสู่ระบบ</button>
        </div>

        <div id="page-menu" class="page-section">...</div>
        <div id="page-profile" class="page-section">...</div>
    </div>

    <script>
        // ⚠️ บรรทัดที่สำคัญที่สุด: ใส่ URL จาก Google Apps Script ของคุณที่นี่
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6uzHPSFJuPN9dvi6IUSkasIq5poX3MJBxc-x1YErAn9YmSEq3z_YbtUaWozC5_vs/exec';

        // ฟังก์ชันหลักในการดึงข้อมูล (มาแทน google.script.run)
        async function callServer(action, data = {}) {
            data.action = action;
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (err) {
                console.error(err);
                Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
            }
        }

        // ตัวอย่างการเปลี่ยนคำสั่งเดิม
        async function checkLogin() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPassword').value;
            
            Swal.fire({ title: 'กำลังตรวจสอบ...', didOpen: () => Swal.showLoading() });
            
            const result = await callServer('login', { user, pass });
            Swal.close();

            if (result.status === "success") {
                // จัดการเรื่องเปลี่ยนหน้าเหมือนโค้ดเดิมของคุณ...
            } else {
                Swal.fire('ล้มเหลว', 'ชื่อหรือรหัสผ่านผิด', 'error');
            }
        }

        // --- เปลี่ยนฟังก์ชันอื่นๆ (loadAdminData, submitData, ฯลฯ) ให้ใช้ await callServer แทน ---
    </script>
</body>
</html>
